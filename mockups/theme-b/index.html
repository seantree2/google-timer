<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup B — Casio Inspired</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="timer-card size-m">
    <div class="drag-region"></div>
    <aside class="queue-panel" aria-label="Timer queue">
      <h2 class="queue-title">// QUEUE</h2>
      <ol class="queue-list" id="queue-list"></ol>
    </aside>
    <section class="timer-main">
      <div class="top-bar">
        <div class="size-toggle" role="group" aria-label="Display size">
          <button class="size-btn" data-size="s" aria-label="Small display">S</button>
          <button class="size-btn is-active" data-size="m" aria-label="Medium display">M</button>
          <button class="size-btn" data-size="l" aria-label="Large display">L</button>
        </div>
        <button class="icon-btn" id="fullscreen-btn" title="Full screen (F)" aria-label="Full screen"></button>
      </div>

      <div class="status-line">
        <span class="status-label">MODE</span>
        <span class="status-value" id="status-mode">READY</span>
      </div>

      <div class="timer-display">
        <svg class="progress-ring" viewBox="0 0 200 200" aria-hidden="true">
          <circle class="ring-bg" cx="100" cy="100" r="92"></circle>
          <circle class="ring-fg" cx="100" cy="100" r="92" id="progress"></circle>
        </svg>
        <div class="time-area">
          <div class="time-view" id="time-view" tabindex="0" role="button" aria-label="Set timer duration">
            <span id="time-content">5:00</span>
          </div>
          <div class="time-edit" id="time-edit" hidden>
            <span class="time-stepper-group">
              <button class="time-stepper" data-target="hours" data-delta="1" aria-label="Increment hours">+</button>
              <input type="text" id="hours" inputmode="numeric" maxlength="1" value="0">
              <button class="time-stepper" data-target="hours" data-delta="-1" aria-label="Decrement hours">&minus;</button>
            </span>
            <span class="time-colon">:</span>
            <span class="time-stepper-group">
              <button class="time-stepper" data-target="minutes" data-delta="1" aria-label="Increment minutes">+</button>
              <input type="text" id="minutes" inputmode="numeric" maxlength="2" value="05">
              <button class="time-stepper" data-target="minutes" data-delta="-1" aria-label="Decrement minutes">&minus;</button>
            </span>
            <span class="time-colon">:</span>
            <span class="time-stepper-group">
              <button class="time-stepper" data-target="seconds" data-delta="1" aria-label="Increment seconds">+</button>
              <input type="text" id="seconds" inputmode="numeric" maxlength="2" value="00">
              <button class="time-stepper" data-target="seconds" data-delta="-1" aria-label="Decrement seconds">&minus;</button>
            </span>
          </div>
        </div>
      </div>

      <div class="controls">
        <button class="control-btn" id="start-pause-btn" title="Start / Pause (Space)" aria-label="Start or pause"></button>
        <button class="control-btn" id="reset-btn" title="Reset (R)" aria-label="Reset"></button>
      </div>
    </section>
  </main>

  <script src="../../renderer.js"></script>
  <script>
  // IIFE: isolates this script's `const card` from renderer.js's `const card`
  // (classic scripts share the global declarative environment — duplicate
  // top-level `const` would silently abort the whole script).
  (function () {
    // Size toggle — switch between three display sizes (S/M/L)
    const card = document.querySelector('.timer-card');
    document.querySelectorAll('.size-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('is-active'));
        btn.classList.add('is-active');
        card.classList.remove('size-s', 'size-m', 'size-l');
        card.classList.add('size-' + btn.dataset.size);
      });
    });

    // Status line reflects timer state
    const statusValue = document.getElementById('status-mode');
    function updateStatus() {
      const c = card.classList;
      if (c.contains('finished')) statusValue.textContent = '-- DONE --';
      else if (c.contains('paused')) statusValue.textContent = '// HOLD';
      else if (c.contains('timer-running')) statusValue.textContent = '>> RUN';
      else statusValue.textContent = 'READY';
    }
    new MutationObserver(updateStatus).observe(card, { attributes: true, attributeFilter: ['class'] });
    updateStatus();

    // ===== Increment/decrement steppers =====
    // Main timer steppers
    function stepInput(input, delta, max, padLen) {
      let v = (parseInt(input.value, 10) || 0) + delta;
      if (v < 0) v = max;            // wrap around
      if (v > max) v = 0;
      input.value = String(v).padStart(padLen, '0');
    }

    document.querySelectorAll('.time-stepper').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.target;
        const delta = parseInt(btn.dataset.delta, 10);
        const input = document.getElementById(target);
        const max = target === 'hours' ? 9 : 59;
        const padLen = target === 'hours' ? 1 : 2;
        stepInput(input, delta, max, padLen);
      });
    });

    // Queue row steppers — inject after renderer.js has built the queue
    document.querySelectorAll('.queue-row').forEach(row => {
      ['q-h', 'q-m', 'q-s'].forEach(cls => {
        const input = row.querySelector('.' + cls);
        if (!input) return;
        const max = cls === 'q-h' ? 9 : 59;
        const padLen = cls === 'q-h' ? 1 : 2;
        const group = document.createElement('span');
        group.className = 'q-stepper-group';
        const minus = document.createElement('button');
        minus.className = 'q-stepper';
        minus.type = 'button';
        minus.textContent = '−';   // minus sign, not hyphen
        minus.setAttribute('aria-label', 'Decrement');
        const plus = document.createElement('button');
        plus.className = 'q-stepper';
        plus.type = 'button';
        plus.textContent = '+';
        plus.setAttribute('aria-label', 'Increment');
        input.parentNode.insertBefore(group, input);
        group.appendChild(minus);
        group.appendChild(input);
        group.appendChild(plus);
        minus.addEventListener('click', (e) => { e.stopPropagation(); stepInput(input, -1, max, padLen); });
        plus.addEventListener('click', (e) => { e.stopPropagation(); stepInput(input, 1, max, padLen); });
      });
    });
  })();
  </script>
</body>
</html>
