<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mockup C — Minimal Focus</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="timer-card">
    <div class="drag-region"></div>

    <section class="timer-main">
      <div class="top-bar">
        <button class="icon-btn" id="queue-toggle" title="Toggle queue (Q)" aria-label="Toggle queue">
          <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
        </button>
        <button class="icon-btn" id="fullscreen-btn" title="Full screen (F)" aria-label="Full screen"></button>
      </div>
      <div class="timer-display">
        <svg class="progress-ring" viewBox="0 0 200 200" aria-hidden="true">
          <circle class="ring-bg" cx="100" cy="100" r="92"></circle>
          <circle class="ring-fg" cx="100" cy="100" r="92" id="progress"></circle>
        </svg>
        <div class="time-area">
          <div class="time-view" id="time-view" tabindex="0" role="button" aria-label="Set timer duration">
            <span id="time-content">5:00</span>
          </div>
          <div class="time-edit" id="time-edit" hidden>
            <input type="text" id="hours" inputmode="numeric" maxlength="1" value="0">
            <span class="time-colon">:</span>
            <input type="text" id="minutes" inputmode="numeric" maxlength="2" value="05">
            <span class="time-colon">:</span>
            <input type="text" id="seconds" inputmode="numeric" maxlength="2" value="00">
          </div>
        </div>
      </div>
      <div class="controls">
        <button class="control-btn" id="start-pause-btn" title="Start / Pause (Space)" aria-label="Start or pause"></button>
        <button class="control-btn" id="reset-btn" title="Reset (R)" aria-label="Reset"></button>
      </div>
    </section>

    <aside class="queue-panel" aria-label="Timer queue">
      <h2 class="queue-title">Queue</h2>
      <ol class="queue-list" id="queue-list"></ol>
    </aside>
    <div class="queue-backdrop"></div>
  </main>
  <script src="../../renderer.js"></script>
  <script>
    // Minimal Focus toggle: queue is a slide-in drawer
    const toggleBtn = document.getElementById('queue-toggle');
    const queuePanel = document.querySelector('.queue-panel');
    const backdrop = document.querySelector('.queue-backdrop');
    function setQueueOpen(open) {
      document.body.classList.toggle('queue-open', open);
    }
    toggleBtn.addEventListener('click', () => setQueueOpen(!document.body.classList.contains('queue-open')));
    backdrop.addEventListener('click', () => setQueueOpen(false));
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'q' || e.key === 'Q') setQueueOpen(!document.body.classList.contains('queue-open'));
      else if (e.key === 'Escape' && document.body.classList.contains('queue-open')) setQueueOpen(false);
    });
  </script>
</body>
</html>
